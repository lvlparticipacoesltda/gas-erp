# fly.toml app configuration file generated for gas-erp-api on 2026-07-03T10:39:10-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gas-erp-api'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'bash scripts/fly-release.sh'
  release_command_timeout = '5m'

[env]
  NODE_ENV = 'production'
  # Geocoding Google desligado — Nominatim (grátis) apenas. Directions usa outra API.
  GOOGLE_GEOCODING_ENABLED = 'false'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
