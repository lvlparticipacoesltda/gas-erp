# Fly.io — API NestJS em São Paulo (GRU), próximo ao Neon sa-east-1
# Primeiro deploy: fly launch --copy-config --no-deploy  (ajuste app name se quiser)
# Depois: fly secrets set ... && fly deploy

app = 'gas-erp-api'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[deploy]
  release_command = 'bash scripts/fly-release.sh'
