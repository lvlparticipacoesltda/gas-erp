[build]
builder = "nixpacks"
# NODE_ENV=production no Railway faz o pnpm pular devDependencies (prisma, typescript, nest cli).
buildCommand = "pnpm install --frozen-lockfile --prod=false && pnpm db:generate && pnpm turbo build --filter=@gas-erp/api"

[deploy]
releaseCommand = "bash scripts/railway-release.sh"
startCommand = "node apps/api/dist/main.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
